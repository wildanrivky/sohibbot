<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0D0D0D"/>
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(245,192,0,0.04)" stroke-width="1"/>
    </pattern>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F5C000;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFD740;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C49A00;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Decorative circle -->
  <circle cx="950" cy="315" r="320" fill="none" stroke="rgba(245,192,0,0.06)" stroke-width="1"/>
  <circle cx="950" cy="315" r="230" fill="none" stroke="rgba(245,192,0,0.04)" stroke-width="1"/>
  <!-- Gold accent line top -->
  <rect x="80" y="180" width="80" height="3" fill="#F5C000" rx="1"/>
  <!-- Tagline small -->
  <text x="80" y="165" font-family="Georgia, serif" font-size="14" fill="rgba(245,192,0,0.7)" letter-spacing="5" text-transform="uppercase">IKASI POLBAN</text>
  <!-- Main headline -->
  <text x="80" y="280" font-family="Georgia, serif" font-size="72" font-weight="900" fill="white">Satu Jaringan.</text>
  <text x="80" y="370" font-family="Georgia, serif" font-size="72" font-weight="900" fill="url(#goldGrad)">40 Angkatan.</text>
  <text x="80" y="460" font-family="Georgia, serif" font-size="72" font-weight="900" fill="white">Ribuan Koneksi.</text>
  <!-- Subtitle -->
  <text x="80" y="520" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.5)">Alumni Teknik Sipil Politeknik Negeri Bandung • ikasipolban.com</text>
  <!-- Stats -->
  <text x="80" y="570" font-family="Arial, sans-serif" font-size="16" fill="rgba(245,192,0,0.6)" letter-spacing="3">3.528+ ANGGOTA  ·  40+ ANGKATAN  ·  BERDIRI 1982</text>
</svg>
